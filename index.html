<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DOM-WARS by RBD</title>
	<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<div class="contenedor-principal">
		<header>
			
		</header>

		<main>
			<section id="hangar" class="section-container active-section">
				
			</section>

			<section id="registro-pilotos" class="section-container">
				
			</section>

			<section id="misiones-kanban" class="section-container">
				<h1>Panel de Misiones</h1>
				<div class="controles controles-formulario">
					<form id="form-mision" class="form-simple">
						<input type="text" id="mision-nombre" placeholder="Nombre misión">
						<input type="text" id="mision-descripcion" placeholder="Descripción breve">
						<select id="mision-piloto"></select>
						<select id="mision-dificultad">
							<option value="facil">Fácil</option>
							<option value="media">Media</option>
							<option value="dificil">Difícil</option>
							<option value="suicida">Suicida</option>
						</select>
						<input type="date" id="mision-fecha">
						<button class="action-btn primary" type="submit">Crear misión</button>
					</form>
					<select id="filtro-dificultad">
						<option value="todas">Todas</option>
						<option value="facil">Fácil</option>
						<option value="media">Media</option>
						<option value="dificil">Difícil</option>
						<option value="suicida">Suicida</option>
					</select>
				</div>
				<div class="kanban-board">
					
				</div>
			</section>

			<section id="mando-alianza" class="section-container">
				<h1>Mando de la Alianza</h1>
				<div class="control-grid">
					
				</div>
			</section>
		</main>
	</div>

	<div id="modal-overlay" class="modal-overlay">
		
			
	</div>

	<script src="js/main.js" defer></script>
</body>
</html>
